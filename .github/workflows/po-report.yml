name: PO Report

on:
  schedule:
    # 10:00 UK time — 09:00 UTC (BST) / 10:00 UTC (GMT)
    # Runs Tue, Thu, Fri, Sun
    - cron: "0 9 * * 0,2,4,5"
  workflow_dispatch: # Allow manual trigger

jobs:
  run-po-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      UNLEASHED_API_ID: ${{ secrets.UNLEASHED_API_ID }}
      UNLEASHED_API_KEY: ${{ secrets.UNLEASHED_API_KEY }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Copy config template
        run: cp config.template.yaml config.yaml

      - name: Run PO report pipeline
        run: python main.py --now
